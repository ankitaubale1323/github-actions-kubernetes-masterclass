name: CI — Build, Scan & Push

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "k8s/**"

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Secret leak detection (runs first)
  # ─────────────────────────────────────────────
  secret-scan:
    name:  Gitleaks — Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so gitleaks can scan all commits

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # JOB 2 — Build images + Trivy scan + Push
  # ─────────────────────────────────────────────
  build-scan-push:
    name: Build → Scan → Push
    runs-on: ubuntu-latest
    needs: secret-scan            # only runs if secret-scan passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Login to Docker Hub ──────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Build Backend ────────────────────────
      - name: Build backend image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:${{ github.sha }} \
            ./backend

      # ── Build Frontend ───────────────────────
      - name: Build frontend image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:${{ github.sha }} \
            ./frontend

      # ── Trivy — Scan Backend ─────────────────
      - name: Trivy scan — Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:latest
          format: table
          exit-code: "1"          # FAIL pipeline if CRITICAL/HIGH found
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      # ── Trivy — Scan Frontend ────────────────
      - name: Trivy scan — Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:latest
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      # ── Push Backend ─────────────────────────
      - name: Push backend to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:${{ github.sha }}

      # ── Push Frontend ────────────────────────
      - name: Push frontend to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:${{ github.sha }}

      # ── Summary ──────────────────────────────
      - name:  Print image tags
        run: |
          echo "Backend  → ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:${{ github.sha }}"
          echo "Frontend → ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:${{ github.sha }}"