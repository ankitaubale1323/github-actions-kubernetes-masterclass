apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: skillpulse
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ankitaubale1323/github-actions-kubernetes-masterclass
    targetRevision: main
    path: helm/skillpulse
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: skillpulse
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
